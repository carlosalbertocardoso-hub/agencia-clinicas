name: Blog Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
    - cron: "0 7 * * 4"

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate blog draft
        id: agent
        run: npm run blog:agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}

      - name: Validate build
        if: steps.agent.outputs.generated == 'true'
        run: npm run build

      - name: Create pull request
        if: steps.agent.outputs.generated == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: blog-agent/${{ github.run_id }}
          GENERATED_FILE: ${{ steps.agent.outputs.generated_file }}
          POST_TITLE: ${{ steps.agent.outputs.title }}
        run: |
          existing_pr_count="$(gh pr list --state open --search "$GENERATED_FILE in:body" --json number --jq 'length')"
          if [ "$existing_pr_count" != "0" ]; then
            echo "Ya existe una PR abierta para $GENERATED_FILE. No se crea duplicado."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "iclinicas blog agent"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH_NAME"
          git add "$GENERATED_FILE"
          git commit -m "Draft blog post: $POST_TITLE"
          git push origin "$BRANCH_NAME"
          PR_URL="$(gh pr create \
            --title "Borrador blog: $POST_TITLE" \
            --body "Borrador generado automáticamente por el agente editorial.\n\nArchivo: $GENERATED_FILE\n\nRevisar contenido, fuentes, enlaces internos, normativa sanitaria y CTA antes de publicar." \
            --base master \
            --head "$BRANCH_NAME")"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Send review email
        if: steps.agent.outputs.generated == 'true' && steps.pr.outputs.pr_url != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          GENERATED_FILE: ${{ steps.agent.outputs.generated_file }}
          POST_TITLE: ${{ steps.agent.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          export DRAFT_CONTENT="$(cat "$GENERATED_FILE" | head -c 8000)"
          node - <<'EOF'
          const resendKey = process.env.RESEND_API_KEY
          const from = process.env.RESEND_FROM_EMAIL
          const to = process.env.CONTACT_TO_EMAIL
          const prUrl = process.env.PR_URL
          const title = process.env.POST_TITLE
          const file = process.env.GENERATED_FILE
          const content = process.env.DRAFT_CONTENT || ''

          const escapedContent = content
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')

          const body = JSON.stringify({
            from,
            to,
            subject: `[Blog iclinicas] Borrador listo para revisión: ${title}`,
            html: `
              <h2 style="color:#0A6B5E">Nuevo borrador de blog generado</h2>
              <p><strong>Título:</strong> ${title}</p>
              <p><strong>Archivo:</strong> ${file}</p>
              <hr/>
              <p>Revisa el contenido, verifica fuentes, normativa sanitaria y enlaces internos.</p>
              <p>
                <a href="${prUrl}" style="display:inline-block;padding:12px 24px;background:#0A6B5E;color:#fff;text-decoration:none;border-radius:4px;font-weight:bold">
                  Ver borrador y publicar en GitHub
                </a>
              </p>
              <p style="color:#5A5A5A;font-size:13px">
                En la PR: revisa el archivo MDX, haz los ajustes que necesites y pulsa <strong>Merge pull request</strong> para publicarlo.
              </p>
              <hr/>
              <h3>Vista previa del borrador</h3>
              <pre style="background:#F4F1EA;padding:16px;border-radius:4px;font-size:12px;white-space:pre-wrap;overflow:auto">${escapedContent}</pre>
            `
          })

          fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: {
              'Authorization': \`Bearer \${resendKey}\`,
              'Content-Type': 'application/json'
            },
            body
          })
          .then(r => r.json())
          .then(data => {
            if (data.error) {
              console.error('Error enviando email:', JSON.stringify(data.error))
              process.exit(1)
            }
            console.log('Email de revisión enviado:', data.id)
          })
          .catch(err => {
            console.error('Error:', err.message)
            process.exit(1)
          })
          EOF
